<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Hero — Or Ben-Senior</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,700;9..40,800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --yellow: #FFD60A; --black: #111111; --accent: #1a1a1a; }
        body { font-family: 'DM Sans', sans-serif; background: var(--black); color: #fff; }

        .cs-nav {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 40px;
            background: rgba(17,17,17,0.96); backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .back-btn { font-size: 14px; font-weight: 600; color: var(--yellow); text-decoration: none; }
        .back-btn:hover { opacity: 0.75; }
        .nav-project { font-size: 14px; font-weight: 700; color: #fff; }
        .nav-name { font-size: 13px; color: rgba(255,255,255,0.4); }

        .cs-hero {
            background: var(--yellow);
            padding: 72px 40px 64px;
            min-height: 260px; display: flex; align-items: flex-end;
        }
        .cs-hero-inner { max-width: 1100px; margin: 0 auto; width: 100%; }
        .cs-tag { display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: rgba(17,17,17,0.55); margin-bottom: 16px; }
        .cs-hero h1 { font-size: clamp(36px, 5vw, 56px); font-weight: 800; letter-spacing: -1.5px; line-height: 1; color: #111; }

        .cs-case { max-width: 1100px; margin: 0 auto; }
        .cs-case img { display: block; width: 100%; }

        .cs-proto {
            background: #0d0d0d;
            padding: 64px 40px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .cs-proto-inner { max-width: 1100px; margin: 0 auto; }
        .cs-proto-label {
            font-size: 11px; font-weight: 600; letter-spacing: 2px;
            text-transform: uppercase; color: var(--yellow);
            margin-bottom: 24px;
        }
        .cs-proto-frame + .cs-proto-label { margin-top: 48px; }
        .cs-proto-frame {
            position: relative; width: 100%; height: 85vh; min-height: 600px;
            border-radius: 12px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .cs-proto-frame iframe { width: 100%; height: 100%; border: none; display: block; }
        .cs-proto-trigger {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 16px; width: 100%; height: 100%; cursor: pointer;
            background: #0a0a0a;
        }
        .cs-proto-hint { font-size: 13px; color: rgba(255,255,255,0.28); letter-spacing: 0.4px; }
        .cs-proto-btn {
            display: inline-flex; align-items: center; gap: 10px;
            background: var(--yellow); color: #111;
            font-family: 'DM Sans', sans-serif; font-weight: 700;
            font-size: 14px; letter-spacing: 0.3px;
            padding: 14px 28px; border-radius: 8px; border: none;
            cursor: pointer; transition: opacity 0.15s;
        }
        .cs-proto-btn:hover { opacity: 0.85; }

        .cs-footer { padding: 48px 40px; text-align: center; border-top: 1px solid rgba(255,255,255,0.06); }
        .cs-footer a { font-size: 14px; font-weight: 600; color: var(--yellow); text-decoration: none; }
        .cs-footer a:hover { opacity: 0.75; }

        @media (max-width: 600px) {
            .cs-nav { padding: 14px 20px; }
            .nav-name { display: none; }
            .cs-hero { padding: 48px 20px 40px; }
            .cs-proto { padding: 40px 20px; }
        }
        #page-veil {
            position: fixed; inset: 0; background: var(--black);
            z-index: 9998; pointer-events: none;
            opacity: 1; transition: opacity 0.28s ease;
        }
        #page-veil.clear { opacity: 0; }
        @media (prefers-reduced-motion: reduce) { #page-veil { display: none !important; } }
    </style>
</head>
<body>
    <div id="page-veil"></div>

    <nav class="cs-nav">
        <a class="back-btn" href="index.html">← Back</a>
        <span class="nav-project">Life Hero</span>
        <span class="nav-name">Or Ben-Senior</span>
    </nav>

    <main class="cs-case">
        <img src="lifehero-case.jpg" alt="Life Hero case study" loading="eager">
    </main>

    <section class="cs-proto">
        <div class="cs-proto-inner">
            <p class="cs-proto-label">Onboarding Flow</p>
            <div class="cs-proto-frame">
                <div class="cs-proto-trigger"
                     data-src="https://embed.figma.com/proto/kx25s0IsCItHbPhWsHUbT5/the-beginning?node-id=31-339516&viewport=362%2C532%2C0.09&t=bpUqaVnIwS0pusxW-1&scaling=scale-down&content-scaling=fixed&starting-point-node-id=31%3A339516&page-id=0%3A1&embed-host=share"
                     onclick="loadProto(this)">
                    <span class="cs-proto-hint">Click to load interactive prototype</span>
                    <button class="cs-proto-btn" type="button">▶ Launch Prototype</button>
                </div>
            </div>
            <p class="cs-proto-label">App Prototype</p>
            <div class="cs-proto-frame">
                <div class="cs-proto-trigger"
                     data-src="https://embed.figma.com/proto/FrccRUCKeeTASWZ6jLsueB/life-hero-App-Prototype?node-id=1201-281172&p=f&viewport=362%2C532%2C0.06&t=eVmC9rGR9GilzSE5-1&scaling=min-zoom&content-scaling=responsive&page-id=1201%3A263366&embed-host=share"
                     onclick="loadProto(this)">
                    <span class="cs-proto-hint">Click to load interactive prototype</span>
                    <button class="cs-proto-btn" type="button">▶ Launch Prototype</button>
                </div>
            </div>
            <p class="cs-proto-label">Sidekick Selector</p>
            <div class="cs-proto-frame">
                <div class="cs-proto-trigger"
                     data-src="https://embed.figma.com/proto/nvpgA78RSisAVHmhiQV7RV/life-hero---Sidekick-Selector?node-id=330-320907&p=f&viewport=275%2C1063%2C0.27&t=MlEXQ8f5UmWFMUPT-1&scaling=min-zoom&content-scaling=fixed&starting-point-node-id=330%3A320907&page-id=283%3A278398&embed-host=share"
                     onclick="loadProto(this)">
                    <span class="cs-proto-hint">Click to load interactive prototype</span>
                    <button class="cs-proto-btn" type="button">▶ Launch Prototype</button>
                </div>
            </div>
        </div>
    </section>

    <footer class="cs-footer">
        <a href="index.html">← Back to Portfolio</a>
    </footer>

    <script>
        function loadProto(trigger) {
            var src = trigger.dataset.src;
            var frame = trigger.parentElement;
            frame.innerHTML = '<iframe src="' + src + '" allowfullscreen style="width:100%;height:100%;border:none;display:block;"></iframe>';
        }

        (function() {
            var veil = document.getElementById('page-veil');
            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) { veil.style.display = 'none'; return; }
            requestAnimationFrame(function() { requestAnimationFrame(function() { veil.classList.add('clear'); }); });
            document.querySelectorAll('a[href]').forEach(function(link) {
                var href = link.getAttribute('href');
                if (!href || href.charAt(0) === '#' || href.startsWith('mailto:') || href.startsWith('tel:') || link.target === '_blank') return;
                if (/^https?:\/\//.test(href)) return;
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    veil.classList.remove('clear');
                    setTimeout(function() { window.location.href = href; }, 300);
                });
            });
        })();
    </script>
</body>
</html>
