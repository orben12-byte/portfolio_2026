<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blinkage — Or Ben-Senior</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,700;9..40,800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --yellow: #FFD60A; --black: #111111; --accent: #3547DB; }
        body { font-family: 'DM Sans', sans-serif; background: var(--black); color: #fff; }

        .cs-progress {
            position: fixed; top: 0; left: 0; z-index: 101;
            height: 3px; width: 0%;
            background: var(--yellow);
            transition: width 0.08s linear;
            pointer-events: none;
        }
        @media (prefers-reduced-motion: reduce) { .cs-progress { display: none !important; } }

        .cs-nav {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 40px;
            background: rgba(17,17,17,0.96); backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .back-btn { font-size: 14px; font-weight: 600; color: var(--yellow); text-decoration: none; }
        .back-btn:hover { opacity: 0.75; }
        .nav-project { font-size: 14px; font-weight: 700; color: #fff; }
        .nav-proto-btn {
            font-size: 13px; font-weight: 600;
            color: rgba(255,255,255,0.55);
            text-decoration: none;
            transition: color 0.15s;
            white-space: nowrap;
        }
        .nav-proto-btn:hover { color: var(--yellow); }
        .nav-proto-btn:focus-visible { outline: 2px solid var(--yellow); outline-offset: 4px; border-radius: 4px; }

        .cs-case { max-width: 1100px; margin: 0 auto; }
        .cs-case img { display: block; width: 100%; }

        .cs-live { padding: 40px 40px 0; }
        .cs-live-inner { max-width: 1100px; margin: 0 auto; text-align: center; }
        .cs-live-btn {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--yellow); color: #111;
            font-weight: 700; font-size: 14px; letter-spacing: 0.3px;
            padding: 13px 24px; border-radius: 8px; text-decoration: none;
            transition: opacity 0.15s;
        }
        .cs-live-btn:hover { opacity: 0.82; }

        .cs-proto {
            background: #0d0d0d;
            padding: 64px 40px;
            border-top: 1px solid rgba(255,255,255,0.06);
            scroll-margin-top: 60px;
        }
        .cs-proto-inner { max-width: 1100px; margin: 0 auto; }
        .cs-proto-label {
            font-size: 11px; font-weight: 600; letter-spacing: 2px;
            text-transform: uppercase; color: var(--yellow);
            margin-bottom: 24px;
        }
        .cs-proto-frame {
            position: relative; width: 100%; height: 85vh; min-height: 600px;
            border-radius: 12px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .cs-proto-frame iframe { width: 100%; height: 100%; border: none; display: block; }
        .cs-proto-trigger {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 16px; width: 100%; height: 100%; cursor: pointer; background: #0a0a0a;
        }
        .cs-proto-hint { font-size: 13px; color: rgba(255,255,255,0.55); letter-spacing: 0.4px; }
        .cs-proto-btn {
            display: inline-flex; align-items: center; gap: 10px;
            background: var(--yellow); color: #111;
            font-family: 'DM Sans', sans-serif; font-weight: 700;
            font-size: 14px; letter-spacing: 0.3px;
            padding: 14px 28px; border-radius: 8px; border: none;
            cursor: pointer; transition: opacity 0.15s;
        }
        .cs-proto-btn:hover { opacity: 0.85; }
        .cs-proto-btn:focus-visible { outline: 2px solid var(--yellow); outline-offset: 2px; }

        .cs-project-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 40px 40px;
            border-top: 1px solid rgba(255,255,255,0.06);
            max-width: 1100px; margin: 0 auto;
        }
        .cs-pnav-item { display: flex; flex-direction: column; gap: 6px; text-decoration: none; }
        .cs-pnav-item:hover .cs-pnav-name,
        .cs-pnav-item:focus-visible .cs-pnav-name { color: var(--yellow); }
        .cs-pnav-item:focus-visible { outline: 2px solid var(--yellow); outline-offset: 4px; border-radius: 4px; }
        .cs-pnav-dir { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.55); }
        .cs-pnav-name { font-size: 18px; font-weight: 700; color: #fff; transition: color 0.15s; }
        .cs-pnav-next { text-align: right; }

        .cs-footer { padding: 24px 40px 40px; text-align: center; }
        .cs-footer a { font-size: 14px; font-weight: 600; color: #888; text-decoration: none; }
        .cs-footer a:hover { color: var(--yellow); }

        @media (max-width: 600px) {
            .cs-nav { padding: 14px 20px; }
            .cs-live { padding: 32px 20px 0; }
            .cs-proto { padding: 40px 20px; }
            .cs-project-nav { padding: 32px 20px; }
            .cs-pnav-name { font-size: 15px; }
        }
        #page-veil {
            position: fixed; inset: 0; background: var(--black);
            z-index: 9998; pointer-events: none;
            opacity: 1; transition: opacity 0.28s ease;
        }
        #page-veil.clear { opacity: 0; }
        @media (prefers-reduced-motion: reduce) { #page-veil { display: none !important; } }
    </style>
</head>
<body>
    <div id="page-veil"></div>
    <div id="cs-progress" class="cs-progress"></div>

    <nav class="cs-nav" aria-label="Main">
        <a class="back-btn" href="index.html">← Back</a>
        <span class="nav-project">Blinkage</span>
        <a class="nav-proto-btn" href="#prototype">Prototype ↓</a>
    </nav>

    <main class="cs-case">
        <img src="blinkage-case.jpg" alt="Blinkage case study" loading="eager">
    </main>

    <div class="cs-live">
        <div class="cs-live-inner">
            <a href="https://www.blinkage.com/" target="_blank" rel="noopener" class="cs-live-btn">
                Visit Live Site →
            </a>
        </div>
    </div>

    <section id="prototype" class="cs-proto">
        <div class="cs-proto-inner">
            <p class="cs-proto-label">Interactive Prototype</p>
            <div class="cs-proto-frame">
                <div class="cs-proto-trigger"
                     data-src="https://embed.figma.com/proto/WaCErS6zwfxydmEEvCUBIT/2023-Project?node-id=1-11343&p=f&viewport=369%2C551%2C0.02&t=t6yC2ry4t5i5lxxJ-1&scaling=scale-down-width&content-scaling=fixed&starting-point-node-id=1%3A11343&page-id=1%3A2&embed-host=share"
                     onclick="loadProto(this)">
                    <span class="cs-proto-hint">Click to load interactive prototype</span>
                    <button class="cs-proto-btn" type="button">▶ Launch Prototype</button>
                </div>
            </div>
        </div>
    </section>

    <nav class="cs-project-nav" aria-label="Projects">
        <a href="project-lifehero.html" class="cs-pnav-item">
            <span class="cs-pnav-dir">← Previous</span>
            <span class="cs-pnav-name">Life Hero</span>
        </a>
        <a href="project-sirkis.html" class="cs-pnav-item cs-pnav-next">
            <span class="cs-pnav-dir">Next →</span>
            <span class="cs-pnav-name">Sirkis 21</span>
        </a>
    </nav>

    <footer class="cs-footer">
        <a href="index.html">← Back to Portfolio</a>
    </footer>

    <script>
        function loadProto(trigger) {
            var src = trigger.dataset.src;
            var frame = trigger.parentElement;
            var iframe = document.createElement('iframe');
            iframe.src = src;
            iframe.allowFullscreen = true;
            iframe.setAttribute('tabindex', '0');
            iframe.style.cssText = 'width:100%;height:100%;border:none;display:block;';
            frame.innerHTML = '';
            frame.appendChild(iframe);
            iframe.focus();
        }

        (function() {
            var bar = document.getElementById('cs-progress');
            if (bar && !window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                window.addEventListener('scroll', function() {
                    var h = document.documentElement;
                    bar.style.width = (h.scrollTop / (h.scrollHeight - h.clientHeight) * 100) + '%';
                }, { passive: true });
            }

            var veil = document.getElementById('page-veil');
            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) { veil.style.display = 'none'; return; }
            requestAnimationFrame(function() { requestAnimationFrame(function() { veil.classList.add('clear'); }); });
            document.querySelectorAll('a[href]').forEach(function(link) {
                var href = link.getAttribute('href');
                if (!href || href.charAt(0) === '#' || href.startsWith('mailto:') || href.startsWith('tel:') || link.target === '_blank') return;
                if (/^https?:\/\//.test(href)) return;
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    veil.classList.remove('clear');
                    setTimeout(function() { window.location.href = href; }, 300);
                });
            });
        })();
    </script>
</body>
</html>
