<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blinkage — Or Ben-Senior</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,700;9..40,800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --yellow: #FFD60A; --black: #111111; --accent: #3547DB; }
        body { font-family: 'DM Sans', sans-serif; background: var(--black); color: #fff; }

        .cs-nav {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 40px;
            background: rgba(17,17,17,0.96); backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .back-btn { font-size: 14px; font-weight: 600; color: var(--yellow); text-decoration: none; }
        .back-btn:hover { opacity: 0.75; }
        .nav-project { font-size: 14px; font-weight: 700; color: #fff; }
        .nav-name { font-size: 13px; color: rgba(255,255,255,0.4); }

        .cs-hero {
            background: var(--accent);
            padding: 72px 40px 64px;
            min-height: 260px; display: flex; align-items: flex-end;
        }
        .cs-hero-inner { max-width: 900px; margin: 0 auto; width: 100%; }
        .cs-tag { display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-bottom: 16px; }
        .cs-hero h1 { font-size: clamp(36px, 5vw, 56px); font-weight: 800; letter-spacing: -1.5px; line-height: 1; }

        .cs-case { max-width: 900px; margin: 0 auto; }
        .cs-case img { display: block; width: 100%; }

        .cs-footer { padding: 48px 40px; text-align: center; border-top: 1px solid rgba(255,255,255,0.06); }
        .cs-footer a { font-size: 14px; font-weight: 600; color: var(--yellow); text-decoration: none; }
        .cs-footer a:hover { opacity: 0.75; }

        @media (max-width: 600px) {
            .cs-nav { padding: 14px 20px; }
            .nav-name { display: none; }
            .cs-hero { padding: 48px 20px 40px; }
        }
    </style>
</head>
<body>

    <nav class="cs-nav">
        <a class="back-btn" href="index.html">← Back</a>
        <span class="nav-project">Blinkage</span>
        <span class="nav-name">Or Ben-Senior</span>
    </nav>

    <header class="cs-hero">
        <div class="cs-hero-inner">
            <span class="cs-tag">Product Design · Web & Mobile · Enterprise</span>
            <h1>Blinkage</h1>
        </div>
    </header>

    <main class="cs-case">
        <img src="blinkage-case.jpg" alt="Blinkage case study" loading="eager">
    </main>

    <footer class="cs-footer">
        <a href="index.html">← Back to Portfolio</a>
    </footer>

</body>
</html>
