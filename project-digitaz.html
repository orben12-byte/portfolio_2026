<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGI.TAZ — Or Ben-Senior</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,700;9..40,800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --yellow: #FFD60A; --black: #111111; --accent: #2a1a5e; }
        body { font-family: 'DM Sans', sans-serif; background: var(--black); color: #fff; }

        .cs-nav {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 40px;
            background: rgba(17,17,17,0.96); backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .back-btn { font-size: 14px; font-weight: 600; color: var(--yellow); text-decoration: none; }
        .back-btn:hover { opacity: 0.75; }
        .nav-project { font-size: 14px; font-weight: 700; color: #fff; }
        .nav-name { font-size: 13px; color: rgba(255,255,255,0.4); }

        .cs-hero {
            background: var(--accent);
            padding: 72px 40px 64px;
            min-height: 260px; display: flex; align-items: flex-end;
        }
        .cs-hero-inner { max-width: 1100px; margin: 0 auto; width: 100%; }
        .cs-tag { display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-bottom: 16px; }
        .cs-hero h1 { font-size: clamp(36px, 5vw, 56px); font-weight: 800; letter-spacing: -1.5px; line-height: 1; }

        .cs-case { max-width: 1100px; margin: 0 auto; }
        .cs-case img { display: block; width: 100%; }

        .cs-proto {
            background: #0d0d0d;
            padding: 64px 40px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .cs-proto-inner { max-width: 1100px; margin: 0 auto; }
        .cs-proto-label {
            font-size: 11px; font-weight: 600; letter-spacing: 2px;
            text-transform: uppercase; color: var(--yellow);
            margin-bottom: 24px;
        }
        .cs-proto-frame {
            position: relative;
            width: 100%;
            height: 85vh;
            min-height: 600px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .cs-proto-frame iframe {
            width: 100%; height: 100%;
            border: none; display: block;
        }

        .cs-footer { padding: 48px 40px; text-align: center; border-top: 1px solid rgba(255,255,255,0.06); }
        .cs-footer a { font-size: 14px; font-weight: 600; color: var(--yellow); text-decoration: none; }
        .cs-footer a:hover { opacity: 0.75; }

        @media (max-width: 600px) {
            .cs-nav { padding: 14px 20px; }
            .nav-name { display: none; }
            .cs-hero { padding: 48px 20px 40px; }
            .cs-proto { padding: 40px 20px; }
        }
        #page-veil {
            position: fixed; inset: 0; background: var(--black);
            z-index: 9998; pointer-events: none;
            opacity: 1; transition: opacity 0.28s ease;
        }
        #page-veil.clear { opacity: 0; }
        @media (prefers-reduced-motion: reduce) { #page-veil { display: none !important; } }
    </style>
</head>
<body>
    <div id="page-veil"></div>

    <nav class="cs-nav">
        <a class="back-btn" href="index.html">← Back</a>
        <span class="nav-project">DIGI.TAZ E-Wallet</span>
        <span class="nav-name">Or Ben-Senior</span>
    </nav>

    <main class="cs-case">
        <img src="digitaz-case.jpg" alt="DIGI.TAZ case study" loading="eager">
    </main>

    <section class="cs-proto">
        <div class="cs-proto-inner">
            <p class="cs-proto-label">Interactive Prototype</p>
            <div class="cs-proto-frame">
                <iframe
                    src="https://embed.figma.com/proto/WaCErS6zwfxydmEEvCUBIT/2023-Project?node-id=1-2644&p=f&viewport=584%2C559%2C0.04&t=sFiGhyE8CZnzuqNO-1&scaling=scale-down&content-scaling=fixed&starting-point-node-id=1%3A2644&page-id=1%3A3&embed-host=share"
                    allowfullscreen
                    loading="lazy">
                </iframe>
            </div>
        </div>
    </section>

    <footer class="cs-footer">
        <a href="index.html">← Back to Portfolio</a>
    </footer>

    <script>
        (function() {
            var veil = document.getElementById('page-veil');
            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) { veil.style.display = 'none'; return; }
            requestAnimationFrame(function() { requestAnimationFrame(function() { veil.classList.add('clear'); }); });
            document.querySelectorAll('a[href]').forEach(function(link) {
                var href = link.getAttribute('href');
                if (!href || href.charAt(0) === '#' || href.startsWith('mailto:') || href.startsWith('tel:') || link.target === '_blank') return;
                if (/^https?:\/\//.test(href)) return;
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    veil.classList.remove('clear');
                    setTimeout(function() { window.location.href = href; }, 300);
                });
            });
        })();
    </script>
</body>
</html>
